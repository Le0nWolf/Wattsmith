name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  # Eine Pipeline, sequentielle Schritte: Qualität zuerst, dann erst die EXE bauen.
  # Läuft komplett auf windows-latest, weil PyInstaller nicht cross-kompiliert
  # (die EXE muss auf Windows entstehen) — die GPU-freien Tests laufen dort genauso.
  build:
    runs-on: windows-latest
    steps:
      # Action-Versionen auf die Node-24-fähigen Majors (kein Node-20-Deprecation-Hinweis mehr).
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      # Hinweis: pyright läuft NICHT in der CI (strict-Mode erzeugt mit untypisierten UI-Libs
      # nur Rauschen). Gates sind ruff + pytest; pyright bleibt ein optionaler lokaler Check.
      - name: Tests (pytest)
        run: uv run pytest
      - name: Build EXE
        run: uv run nicegui-pack --onefile --name GpuEfficiencyFinder src/gpu_efficiency_finder/__main__.py
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: GpuEfficiencyFinder-windows
          path: dist/GpuEfficiencyFinder.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GpuEfficiencyFinder.exe
